services:
  postgres:
    image: postgres:16-alpine
    container_name: sql_guide_pg
    environment:
      POSTGRES_USER: sql
      POSTGRES_PASSWORD: sql
      POSTGRES_DB: sql_guide
    ports:
      - "5432:5432"
    volumes:
      - sql_guide_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sql -d sql_guide"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  sql_guide_data:
